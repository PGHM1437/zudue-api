services:
  - type: web
    name: zudue-api
    runtime: node
    region: singapore
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        value: postgres://postgres.jlmmpdupapuknhsnudeu:Zudue@786@aws-0-ap-south-1.pooler.supabase.com:6543/postgres
      - key: SUPABASE_JWT_SECRET
        value: super-secret-jwt-token-change-me-in-prod
      - key: AUTH_JWKS_URL
        value: https://jlmmpdupapuknhsnudeu.supabase.co/auth/v1/.well-known/jwks.json
      - key: AUTH_ISSUER
        value: https://jlmmpdupapuknhsnudeu.supabase.co/auth/v1
      - key: AUTH_AUDIENCE
        value: authenticated
      - key: CORS_ORIGINS
        value: https://zudue.com,https://www.zudue.com
      - key: AGORA_APP_ID
        value: ""
      - key: AGORA_APP_CERTIFICATE
        value: ""
      - key: RAZORPAY_KEY_ID
        value: ""
      - key: RAZORPAY_KEY_SECRET
        value: ""
      - key: RAZORPAY_WEBHOOK_SECRET
        value: ""
      - key: S3_ENDPOINT
        value: ""
      - key: S3_REGION
        value: ""
      - key: S3_ACCESS_KEY_ID
        value: ""
      - key: S3_SECRET_ACCESS_KEY
        value: ""
      - key: S3_BUCKET
        value: ""
      - key: FIREBASE_SERVICE_ACCOUNT
        value: ""
    healthCheckPath: /v1
    autoDeploy: true
