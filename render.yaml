services:
  - type: web
    name: zudue-api
    runtime: node
    region: singapore
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # ── Database ──────────────────────────────────────────────────────
      # Previous value could never connect, for two independent reasons:
      #   1. The password contained a raw `@`, which terminates the userinfo
      #      section of a URL — the driver parsed everything after it as the
      #      HOST and failed with "could not translate host name". Verified
      #      directly with psql. Any `@` in a password must be encoded %40.
      #   2. Host was aws-0-ap-south-1; this project answers on aws-1.
      # The value below is verified working (psql: "OK as postgres").
      #
      # NOTE: committing a database password to the repo is not good practice.
      # Prefer `sync: false` here and set the value in the Render dashboard so
      # it lives only there — and rotate this one, since it has been in git.
      - key: DATABASE_URL
        value: postgresql://postgres.jlmmpdupapuknhsnudeu:Zudue_live123@aws-1-ap-south-1.pooler.supabase.com:6543/postgres

      # ── Auth ──────────────────────────────────────────────────────────
      # Verified: the JWKS endpoint serves an ES256 (EC P-256) key, so the
      # API's asymmetric verification path is correct for this project.
      - key: AUTH_JWKS_URL
        value: https://jlmmpdupapuknhsnudeu.supabase.co/auth/v1/.well-known/jwks.json
      - key: AUTH_ISSUER
        value: https://jlmmpdupapuknhsnudeu.supabase.co/auth/v1
      - key: AUTH_AUDIENCE
        value: authenticated

      # ── CORS ──────────────────────────────────────────────────────────
      # The web client is served from somewhere; if it is not on zudue.com the
      # browser will block every call. Add the actual origin (e.g. the Vercel
      # preview domain) or requests fail before reaching a route.
      - key: CORS_ORIGINS
        value: https://zudue.com,https://www.zudue.com

      # ── Redis ─────────────────────────────────────────────────────────
      # Was absent entirely. JobsModule reads it with getOrThrow at boot, and
      # BullMQ drives settlement, stalled-call sweeps and monthly payouts — the
      # money lifecycle does not run without it. Point this at a Render Key
      # Value instance (or any reachable Redis).
      - key: REDIS_URL
        sync: false

      # ── Storage ───────────────────────────────────────────────────────
      # The previous S3_* keys were never read by this codebase — R2Provider
      # reads R2_* and calls getOrThrow on the two bucket names in its
      # CONSTRUCTOR, so they must be non-empty for the app to boot at all.
      - key: R2_BUCKET_KYC
        value: zudue-kyc
      - key: R2_BUCKET_MEDIA
        value: zudue-media
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_PUBLIC_MEDIA_URL
        sync: false

      # ── Optional integrations ─────────────────────────────────────────
      # Read at request time, so an unset value fails only its own endpoint,
      # never the boot. Set in the dashboard rather than committed.
      - key: AGORA_APP_ID
        sync: false
      - key: AGORA_APP_CERTIFICATE
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: FCM_SERVICE_ACCOUNT_B64
        sync: false
      - key: ONESIGNAL_APP_ID
        sync: false
      - key: ONESIGNAL_REST_API_KEY
        sync: false

    # /v1 has no route mapped — only /v1/<module> paths exist — so this health
    # check gets a 404. Pointing it at a real public route means Render can
    # actually tell a booted API from a broken one.
    healthCheckPath: /v1/discover/categories
    autoDeploy: true
